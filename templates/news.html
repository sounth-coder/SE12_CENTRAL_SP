<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girra News - Girraween Student Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/pages.css') }}">
</head>
<body>
    <div class="dashboard">
        {% include 'sidebar.html' %}

        <main class="main-content">
            <div class="page-container">
                <div class="page-header">
                    <h1 class="page-title">Girra News</h1>
                </div>

                {% for item in items %}
                <div class="id-card content-card">
                    {% if item.category %}
                    <span class="content-badge">{{ item.category }}</span>
                    {% endif %}
                    <div class="content-card-header">
                        <h3>{{ item.title }}</h3>
                    </div>
                    <p class="content-meta">
                        {{ item.created_at }}
                        {% if item.first_name %} &middot; {{ item.first_name }} {{ item.last_name }}{% endif %}
                    </p>
                    <p>{{ item.body }}</p>
                </div>
                {% else %}
                <div class="info-panel news-embed-panel">
                    <iframe
                        src="https://girraween-h.schools.nsw.gov.au/about-us/stories-and-highlights"
                        width="100%"
                        height="700"
                        class="news-embed-frame"
                        title="Girraween High School Stories and Highlights"
                    ></iframe>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='scripts/home.js') }}"></script>
</body>
</html>
