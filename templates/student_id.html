<!DOCTYPE html>
<html lang="en">    <!-- PLACE HOLDER STUDENT DIGITAL ID - WILL BE BASIC FOR NOW -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID - Girraween Student Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/pages.css') }}">
</head>
<body>
    <div class="dashboard">
        {% include 'sidebar.html' %}

        <main class="main-content">
            <div class="page-container">
                <h1 class="page-title">Student ID</h1>
                
                <!-- DIGI ID -->
                <div class="id-card">
                    <!-- CARD HEDER -->
                    <div class="id-header">
                        <div class="id-logo">
                            <div class="logo-box-large">
                                <span>G</span>
                            </div>
                            <div>
                                <h2>Girraween High School</h2>
                                <p>Student Identification</p>
                            </div>
                        </div>
                    </div>

                    <!-- STUDENT INFO  -->
                    <div class="id-content">
                        <div class="id-info">
                            <div class="id-avatar">
                                <span>{{ username[0]|upper }}</span>
                            </div>
                            
                            <div class="info-group">
                                <div class="info-item">
                                    <p class="info-label">Full Name</p>
                                    <p class="info-value">{{ username }}</p>
                                </div>
                                
                                <div class="info-item">
                                    <p class="info-label">Student ID</p>
                                    <p class="info-value highlight">
                                        {{ student_id }}
                                    </p>
                                </div>
                                
                                <div class="info-item">
                                    <p class="info-label">Year Level</p>
                                    <p class="info-value">Year {{ year_level }}</p>
                                </div>
                            </div>
                        </div>

                        <div class="id-qr">
                            <div class="barcode-box">
                                <img 
                                    src="{{ url_for('barcode', student_id=student_id) }}"
                                    alt="Student Barcode"
                                    class="student-barcode"
                                >
                            </div>
                            <p>Scan barcode for verification</p>
                        </div>
                    </div>

                    <!-- ADDITIONAL INFO -->
                    <div class="id-footer">
                        <div class="footer-item">
                            <svg class="footer-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span>Valid: 2026 Academic Year</span>
                        </div>
                        <div class="footer-item">
                            <svg class="footer-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <span>{{ email }}</span>
                        </div>
                    </div>
                </div>

                <!-- INSTRUCTIONS -->
                <div class="info-panel">
                    <h3>Usage Instructions</h3> <!-- ADD USER INSTRUCTIONS -->
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='scripts/home.js') }}"></script>
</body>
</html>
